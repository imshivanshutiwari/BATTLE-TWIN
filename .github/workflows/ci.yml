name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short
      - run: python -c "from digital_twin.twin_state import BattlefieldState; from agents.graph import BattleTwinAgentGraph; from planning.dstar_lite import DStarLitePlanner; from planning.mcts_coa import MCTSCourseOfAction; from planning.threat_assessor import BayesianThreatAssessor; print('ALL IMPORTS OK')"
